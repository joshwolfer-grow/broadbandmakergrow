<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadband Facts Label Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#f0f0f0;color:#1a1a1a;min-height:100vh;}
  .app{display:flex;min-height:100vh;}

  .form-panel{
    width:460px;min-width:460px;background:#fff;
    border-right:1px solid #ddd;overflow-y:auto;padding:24px 20px;
  }
  .form-panel h1{font-size:18px;font-weight:700;margin-bottom:2px;}
  .form-panel .subtitle{font-size:12px;color:#666;margin-bottom:20px;}
  .st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;margin:20px 0 8px;padding-top:14px;border-top:1px solid #eee;}
  .st:first-of-type{border-top:none;margin-top:0;padding-top:0;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:11px;font-weight:600;margin-bottom:2px;color:#333;}
  .field input,.field select,.field textarea{
    width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:3px;font-size:12px;font-family:inherit;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#0066cc;box-shadow:0 0 0 2px rgba(0,102,204,0.15);}
  .row{display:flex;gap:8px;}
  .row .field{flex:1;}
  .fee-row{display:flex;gap:6px;align-items:end;margin-bottom:5px;}
  .fee-row .field{flex:1;margin-bottom:0;}
  .fee-row button{padding:6px 8px;background:#e74c3c;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;flex-shrink:0;height:28px;}
  .add-btn{padding:4px 10px;background:#f5f5f5;border:1px dashed #bbb;border-radius:3px;cursor:pointer;font-size:11px;color:#555;margin-top:3px;}
  .add-btn:hover{background:#eee;}
  .actions{margin-top:24px;display:flex;gap:8px;}
  .btn-primary{padding:9px 20px;background:#0066cc;color:#fff;border:none;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-primary:hover{background:#0055aa;}
  .btn-secondary{padding:9px 20px;background:#fff;color:#333;border:1px solid #ccc;border-radius:5px;font-size:13px;cursor:pointer;}

  .preview-panel{
    flex:1;display:flex;align-items:flex-start;justify-content:center;
    padding:32px 20px;overflow-y:auto;background:#e8e8e8;
  }

  /* ══ LABEL — Ezee-style clean text format ══ */
  #label{
    width:380px;background:#fff;border:2px solid #000;
    font-family:'Times New Roman',Times,Georgia,serif;color:#000;line-height:1.35;
    padding:0;
  }

  .lb-title{
    padding:10px 12px 2px;font-size:20px;font-weight:900;
    font-family:Arial,Helvetica,sans-serif;
  }
  .lb-prov{padding:0 12px 8px;font-size:11px;line-height:1.3;border-bottom:1px solid #000;}
  .lb-prov .pn{font-weight:400;}

  /* Monthly price row */
  .lb-price{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:6px 12px;font-size:13px;font-weight:700;
    border-bottom:1px solid #000;
  }
  .lb-price .pv{font-weight:700;}

  /* Explanatory text */
  .lb-note{padding:5px 12px 6px;font-size:10px;line-height:1.3;border-bottom:1px solid #000;}

  /* Section header */
  .lb-sh{padding:5px 12px;font-size:12px;font-weight:700;border-bottom:1px solid #000;}

  /* Dash line item: "- Label     $0" */
  .lb-dl{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:1px 12px;font-size:11px;
  }
  .lb-dl .dll{font-weight:400;}
  .lb-dl .dlv{font-weight:400;text-align:right;white-space:nowrap;}

  /* Block with bottom border */
  .lb-blk{border-bottom:1px solid #000;padding-bottom:4px;}

  /* Plain text block */
  .lb-txt{padding:4px 12px;font-size:10.5px;line-height:1.3;}

  /* Speed line */
  .lb-sl{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:1px 12px;font-size:11px;
  }
  .lb-sl .sll{font-weight:400;}
  .lb-sl .slv{font-weight:400;text-align:right;white-space:nowrap;}

  /* Data row */
  .lb-data-head{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:5px 12px 1px;font-size:12px;font-weight:700;
  }

  /* Two-col label row */
  .lb-2c{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:2px 12px;font-size:11px;
  }
  .lb-2c .c1{font-weight:700;}
  .lb-2c .c2{font-weight:400;text-align:right;}

  /* Customer support block */
  .lb-cs{padding:4px 12px 6px;font-size:10.5px;line-height:1.35;}

  /* Footer */
  .lb-foot{padding:6px 12px 8px;font-size:9.5px;line-height:1.35;border-top:1px solid #000;}

  @media(max-width:1000px){
    .app{flex-direction:column;}
    .form-panel{width:100%;min-width:auto;border-right:none;border-bottom:1px solid #ddd;}
    .preview-panel{padding:20px 10px;}
    #label{width:100%;max-width:380px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="form-panel">
    <h1>Broadband Facts Generator</h1>
    <p class="subtitle">Fill in plan details — preview updates live — download as PNG</p>

    <div class="st">Provider & Plan</div>
    <div class="field"><label>Provider Name</label>
      <input id="providerName" placeholder="e.g. Ezee Fiber" oninput="render()"></div>
    <div class="field"><label>Plan Name</label>
      <input id="planName" placeholder="e.g. 5 Gig + Wi-Fi eero Max 7" oninput="render()"></div>
    <div class="field"><label>Service Type</label>
      <select id="serviceType" onchange="render()">
        <option value="Fixed">Fixed</option><option value="Mobile">Mobile</option>
      </select></div>
    <div class="field"><label>Unique Plan ID (optional)</label>
      <input id="fccId" placeholder="e.g. F0032830051008GTX000241004" oninput="render()"></div>

    <div class="st">Monthly Price</div>
    <div class="field"><label>Monthly Price ($)</label>
      <input id="monthlyPrice" type="number" placeholder="99.00" oninput="render()"></div>
    <div class="field"><label>Price Note</label>
      <select id="priceNote" onchange="render()">
        <option value="not_intro_no_contract">Not an introductory rate & does not require a contract</option>
        <option value="intro">Is an introductory rate</option>
        <option value="contract">Requires a contract</option>
        <option value="custom">Custom note</option>
      </select></div>
    <div class="field"><label>Custom Price Note (if custom)</label>
      <input id="customPriceNote" placeholder="" oninput="render()"></div>

    <div class="st">Additional Charges & Terms</div>
    <div id="chargeRows"></div>
    <button class="add-btn" onclick="addCharge()">+ Add Charge Line</button>

    <div class="st">Discounts & Bundles</div>
    <div class="field"><label>Discounts Text</label>
      <input id="discountText" placeholder="e.g. No confusing discounts or bundles to worry about." oninput="render()"></div>

    <div class="st">Speeds & Latency</div>
    <div class="row">
      <div class="field"><label>Download Speed</label>
        <input id="downSpeed" placeholder="5330" oninput="render()"></div>
      <div class="field"><label>Unit</label>
        <select id="downUnit" onchange="render()"><option value="Mbps">Mbps</option><option value="Gbps">Gbps</option></select></div>
    </div>
    <div class="row">
      <div class="field"><label>Upload Speed</label>
        <input id="upSpeed" placeholder="5410" oninput="render()"></div>
      <div class="field"><label>Unit</label>
        <select id="upUnit" onchange="render()"><option value="Mbps">Mbps</option><option value="Gbps">Gbps</option></select></div>
    </div>
    <div class="field"><label>Typical Latency</label>
      <input id="latency" placeholder="3 milliseconds" oninput="render()"></div>

    <div class="st">Data</div>
    <div class="field"><label>Data Included</label>
      <input id="dataAmount" value="Unlimited" placeholder="Unlimited" oninput="render()"></div>
    <div class="field"><label>Charges for Additional Data Usage</label>
      <input id="overage" value="$0" placeholder="$0" oninput="render()"></div>

    <div class="st">Policies</div>
    <div class="row">
      <div class="field"><label>Network Management</label>
        <input id="netMgmt" value="Read our Policy" placeholder="Read our Policy" oninput="render()"></div>
      <div class="field"><label>Privacy</label>
        <input id="privacy" value="Read our Policy" placeholder="Read our Policy" oninput="render()"></div>
    </div>

    <div class="st">Customer Support</div>
    <div class="field"><label>Contact URL</label>
      <input id="supportUrl" placeholder="ezeefiber.com/contact" oninput="render()"></div>
    <div class="field"><label>Phone</label>
      <input id="supportPhone" placeholder="713-255-7500" oninput="render()"></div>

    <div class="actions">
      <button class="btn-primary" onclick="downloadLabel()">Download PNG</button>
      <button class="btn-secondary" onclick="resetForm()">Clear All</button>
    </div>
  </div>

  <div class="preview-panel">
    <div id="label"></div>
  </div>
</div>

<script>
// Default charge lines matching Ezee format
let charges=[
  {name:'Hidden Monthly Fees',value:'$0'},
  {name:'One Time Fees',value:'$0'},
  {name:'Local Access Fees',value:'$0'},
  {name:'Government Taxes',value:'Included'},
  {name:'Installation Fee',value:'$0'},
  {name:'Late Payment Fee',value:'$0'},
  {name:'Early Termination Fee',value:'$0'}
];

function addCharge(n,v){charges.push({name:n||'',value:v||'$0'});rfi();render();}
function removeCharge(i){charges.splice(i,1);rfi();render();}

function rfi(){
  document.getElementById('chargeRows').innerHTML=charges.map((c,i)=>`
    <div class="fee-row">
      <div class="field"><label>Name</label>
        <input value="${esc(c.name)}" oninput="charges[${i}].name=this.value;render()" placeholder="e.g. Installation Fee"></div>
      <div class="field"><label>Value</label>
        <input value="${esc(c.value)}" oninput="charges[${i}].value=this.value;render()" placeholder="$0"></div>
      <button onclick="removeCharge(${i})">×</button>
    </div>`).join('');
}

function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function escH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function $(id){return document.getElementById(id).value;}

function render(){
  const prov=$('providerName')||'[Provider Name]';
  const plan=$('planName')||'[Plan Name]';
  const type=$('serviceType');
  const upi=$('fccId');
  const price=$('monthlyPrice');
  const pNote=$('priceNote');
  const customNote=$('customPriceNote');
  const down=$('downSpeed')||'000';
  const downU=$('downUnit');
  const up=$('upSpeed')||'000';
  const upU=$('upUnit');
  const lat=$('latency')||'0 milliseconds';
  const dataAmt=$('dataAmount')||'Unlimited';
  const ovr=$('overage')||'$0';
  const disc=$('discountText')||'None';
  const netM=$('netMgmt')||'Read our Policy';
  const priv=$('privacy')||'Read our Policy';
  const sUrl=$('supportUrl');
  const sPh=$('supportPhone');

  let noteText='';
  if(pNote==='not_intro_no_contract') noteText='This Monthly Price is not an introductory rate &amp; does not require a contract.';
  else if(pNote==='intro') noteText='This Monthly Price is an introductory rate.';
  else if(pNote==='contract') noteText='This Monthly Price requires a contract.';
  else noteText=escH(customNote);

  // Build charge lines
  let chargeHTML='';
  charges.forEach(c=>{
    if(c.name) chargeHTML+=`<div class="lb-dl"><span class="dll">- ${escH(c.name)}</span><span class="dlv">${escH(c.value)}</span></div>`;
  });

  const priceDisplay=price?'$'+parseFloat(price).toFixed(2):'$0.00';

  document.getElementById('label').innerHTML=`
    <div class="lb-title">Broadband Facts</div>
    <div class="lb-prov">
      <span class="pn">${escH(prov)}</span><br>
      ${escH(plan)}<br>
      ${escH(type)} Broadband Consumer Disclosure
    </div>

    <div class="lb-price">
      <span>Monthly Price:</span>
      <span class="pv">${priceDisplay}</span>
    </div>

    <div class="lb-note">${noteText}</div>

    <div class="lb-blk">
      <div class="lb-sh">Additional Charges &amp; Terms</div>
      ${chargeHTML}
    </div>

    <div class="lb-blk">
      <div class="lb-sh">Discounts and Bundles</div>
      <div class="lb-txt">${escH(disc)}</div>
    </div>

    <div class="lb-blk">
      <div class="lb-sh">Speeds Provided With Plan</div>
      <div class="lb-sl"><span class="sll">Typical Download Speed</span><span class="slv">${escH(down)} ${escH(downU)}</span></div>
      <div class="lb-sl"><span class="sll">Typical Upload Speed</span><span class="slv">${escH(up)}${escH(upU)}</span></div>
      <div class="lb-sl"><span class="sll">Typical Latency</span><span class="slv">${escH(lat)}</span></div>
    </div>

    <div class="lb-blk">
      <div class="lb-data-head">
        <span>Data Included with<br>Monthly Price</span>
        <span>${escH(dataAmt)}</span>
      </div>
      <div class="lb-dl"><span class="dll">Charges for Additional Data Usage</span><span class="dlv">${escH(ovr)}</span></div>
    </div>

    <div class="lb-blk">
      <div class="lb-2c"><span class="c1">Network<br>Management</span><span class="c2">${escH(netM)}</span></div>
      <div class="lb-2c"><span class="c1">Privacy</span><span class="c2">${escH(priv)}</span></div>
    </div>

    <div class="lb-blk">
      <div class="lb-sh">Customer Support</div>
      <div class="lb-cs">
        Contact Us:<br>
        ${sUrl?escH(sUrl)+'<br>':''}
        ${sPh?escH(sPh):''}
      </div>
    </div>

    <div class="lb-foot">
      Learn more about the terms used on this label by visiting the Federal
      Communications Comission's Consumer Resource Center.<br><br>
      fcc.gov/consumer
      ${upi?'<br><br>Unique Plan ID:<br>'+escH(upi):''}
    </div>
  `;
}

function downloadLabel(){
  html2canvas(document.getElementById('label'),{scale:3,backgroundColor:'#fff',useCORS:true}).then(c=>{
    const a=document.createElement('a');
    const p=$('providerName')||'broadband',n=$('planName')||'label';
    a.download=p.replace(/\s+/g,'_')+'_'+n.replace(/\s+/g,'_')+'_broadband_facts.png';
    a.href=c.toDataURL('image/png');a.click();
  });
}

function resetForm(){
  document.querySelectorAll('.form-panel input, .form-panel textarea').forEach(e=>e.value='');
  document.querySelectorAll('.form-panel select').forEach(e=>e.selectedIndex=0);
  charges=[
    {name:'Hidden Monthly Fees',value:'$0'},
    {name:'One Time Fees',value:'$0'},
    {name:'Local Access Fees',value:'$0'},
    {name:'Government Taxes',value:'Included'},
    {name:'Installation Fee',value:'$0'},
    {name:'Late Payment Fee',value:'$0'},
    {name:'Early Termination Fee',value:'$0'}
  ];
  rfi();render();
}

rfi();render();
</script>
</body>
</html>
