<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadband Facts Label Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #e4e4e7;
    min-height: 100vh;
  }
  .app {
    display: grid;
    grid-template-columns: 350px 1fr;
    min-height: 100vh;
  }

  /* ── FORM ── */
  .fp {
    background: #fff;
    border-right: 1px solid #d4d4d8;
    padding: 20px;
    overflow-y: auto;
    max-height: 100vh;
  }
  .fp h1 { font-size: 14px; font-weight: 700; }
  .fp .sub { font-size: 10px; color: #a1a1aa; margin-bottom: 14px; }

  .sec {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: #a1a1aa;
    margin: 14px 0 5px; padding-top: 10px; border-top: 1px solid #f0f0f0;
  }
  .sec:first-of-type { border: none; padding-top: 0; }

  .row { display: flex; gap: 8px; margin-bottom: 5px; }
  .row > * { flex: 1; }
  .field { margin-bottom: 5px; }
  .field label {
    display: block; font-size: 10px; font-weight: 600; color: #71717a; margin-bottom: 1px;
  }
  .field input, .field textarea {
    width: 100%; padding: 5px 7px; border: 1px solid #e4e4e7; border-radius: 5px;
    font-size: 13px; font-family: inherit; outline: none;
  }
  .field input:focus, .field textarea:focus { border-color: #333; }
  .field input::placeholder, .field textarea::placeholder { color: #c0c0c0; }
  .field textarea { resize: vertical; min-height: 40px; font-size: 12px; }

  .cr {
    display: flex; align-items: center; gap: 4px; margin-bottom: 3px;
  }
  .cr input:first-child { flex: 2; }
  .cr input:nth-child(2) { flex: 1; }
  .cr .x {
    background: none; border: none; color: #d4d4d8; cursor: pointer;
    font-size: 15px; padding: 0 3px; line-height: 1;
  }
  .cr .x:hover { color: #ef4444; }

  .add-btn {
    background: none; border: 1px dashed #d4d4d8; border-radius: 5px;
    padding: 3px 8px; font-size: 10px; color: #a1a1aa; cursor: pointer; width: 100%;
  }
  .add-btn:hover { border-color: #888; color: #555; }

  .actions {
    display: flex; gap: 6px; margin-top: 16px; padding-top: 10px; border-top: 1px solid #f0f0f0;
  }
  .btn {
    flex: 1; padding: 9px; border: none; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-dark { background: #18181b; color: #fff; }
  .btn-dark:hover { background: #333; }
  .btn-lt { background: #f4f4f5; color: #52525b; }
  .btn-lt:hover { background: #e4e4e7; }

  /* ── PREVIEW ── */
  .pp {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; overflow: auto;
  }

  /* ═══════════════════════════════════
     THE LABEL — clean slick-ready card
     ═══════════════════════════════════ */
  #label {
    width: 290px;
    background: #fff;
    border: 2px solid #18181b;
    border-radius: 10px;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    color: #18181b;
    overflow: hidden;
  }

  .lb-head {
    background: #18181b;
    color: #fff;
    padding: 10px 16px 9px;
  }
  .lb-head-title {
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .lb-head-plan {
    font-size: 11px;
    font-weight: 500;
    opacity: 0.7;
    margin-top: 1px;
  }

  .lb-price-block {
    padding: 12px 16px 10px;
    border-bottom: 1.5px solid #e4e4e7;
  }
  .lb-price-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a1a1aa;
    margin-bottom: 1px;
  }
  .lb-price {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .lb-price .cents { font-size: 18px; }
  .lb-price .mo { font-size: 14px; font-weight: 500; color: #71717a; }

  .lb-speeds {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1.5px solid #e4e4e7;
  }
  .lb-speed-cell {
    padding: 10px 12px;
    text-align: center;
  }
  .lb-speed-cell:not(:last-child) {
    border-right: 1.5px solid #e4e4e7;
  }
  .lb-speed-lbl {
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #a1a1aa;
    margin-bottom: 2px;
  }
  .lb-speed-val {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
  }
  .lb-speed-unit {
    font-size: 9px;
    font-weight: 500;
    color: #71717a;
  }

  .lb-fees {
    padding: 10px 16px;
  }
  .lb-fees:empty { display: none; }
  .lb-fees-title {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a1a1aa;
    margin-bottom: 5px;
  }
  .lb-fee-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11.5px;
    padding: 2px 0;
  }
  .lb-fee-row .v {
    font-weight: 700;
    white-space: nowrap;
  }

  .lb-notes {
    padding: 8px 16px 10px;
    border-top: 1.5px solid #e4e4e7;
    font-size: 10px;
    color: #52525b;
    font-style: italic;
    line-height: 1.4;
  }

  .lb-foot {
    background: #f9f9fa;
    padding: 6px 16px;
    font-size: 8px;
    color: #a1a1aa;
    text-align: center;
    border-top: 1.5px solid #e4e4e7;
  }

  @media (max-width: 780px) {
    .app { grid-template-columns: 1fr; }
    .pp { padding: 20px; }
  }
</style>
</head>
<body>
<div class="app">
<div class="fp">
  <h1>Broadband Label Generator</h1>
  <div class="sub">Fill in → Download PNG → Drop in slick</div>

  <div class="sec">Provider & Plan</div>
  <div class="row">
    <div class="field"><label>Provider</label><input id="fProv" placeholder="Ezee Fiber" oninput="render()"></div>
    <div class="field"><label>Plan Name</label><input id="fPlan" placeholder="1 GIG" oninput="render()"></div>
  </div>

  <div class="sec">Monthly Price</div>
  <div class="field"><label>Price ($/mo)</label><input id="fPrice" placeholder="79.99" oninput="render()"></div>

  <div class="sec">Performance</div>
  <div class="row">
    <div class="field"><label>Download</label><input id="fDL" placeholder="1000 Mbps" oninput="render()"></div>
    <div class="field"><label>Upload</label><input id="fUL" placeholder="1000 Mbps" oninput="render()"></div>
    <div class="field"><label>Latency</label><input id="fLat" placeholder="≤ 5 ms" oninput="render()"></div>
  </div>

  <div class="sec">Fees & Charges</div>
  <div id="fees"></div>
  <button class="add-btn" onclick="addF()">+ Add Fee</button>

  <div class="sec">Notes (optional)</div>
  <div class="field">
    <label>Shows at bottom of label in italics</label>
    <textarea id="fNotes" placeholder="e.g. This is lifetime pricing, not an intro rate" oninput="render()"></textarea>
  </div>

  <div class="actions">
    <button class="btn btn-dark" onclick="dlPNG(false)">Download PNG</button>
    <button class="btn btn-lt" onclick="dlPNG(true)">Transparent</button>
    <button class="btn btn-lt" onclick="resetAll()">Reset</button>
  </div>
</div>

<div class="pp">
  <div id="label"></div>
</div>
</div>

<script>
const V=id=>document.getElementById(id).value.trim();
const esc=s=>s.replace(/"/g,'&quot;');
const escH=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML;};

let fees=[
  {n:'Installation',v:'$0'},
  {n:'Equipment Fee',v:'$0'},
  {n:'Hidden Monthly Fees',v:'$0'},
];

function addF(){fees.push({n:'',v:'$0'});renderF();render();}
function rmF(i){fees.splice(i,1);renderF();render();}
function upF(i,f,v){fees[i][f]=v;render();}

function renderF(){
  document.getElementById('fees').innerHTML=fees.map((f,i)=>`<div class="cr">
    <input value="${esc(f.n)}" placeholder="Fee name" oninput="upF(${i},'n',this.value)">
    <input value="${esc(f.v)}" placeholder="$0" oninput="upF(${i},'v',this.value)">
    <button class="x" onclick="rmF(${i})">&times;</button>
  </div>`).join('');
}

function render(){
  const prov=escH(V('fProv')||'Provider');
  const plan=escH(V('fPlan')||'Plan');
  const raw=V('fPrice')||'0';
  const dl=escH(V('fDL')||'—');
  const ul=escH(V('fUL')||'—');
  const lat=escH(V('fLat')||'—');
  const notes=V('fNotes');

  const p=raw.replace('$','');
  const parts=p.split('.');
  const dollars=parts[0];
  const cents=parts[1]?'.'+parts[1]:'';

  const feesHTML=fees.length?`
    <div class="lb-fees">
      <div class="lb-fees-title">Fees & Charges</div>
      ${fees.map(f=>`<div class="lb-fee-row"><span>${escH(f.n)}</span><span class="v">${escH(f.v)}</span></div>`).join('')}
    </div>`:'';

  const notesHTML=notes?`<div class="lb-notes">${escH(notes)}</div>`:'';

  document.getElementById('label').innerHTML=`
    <div class="lb-head">
      <div class="lb-head-title">${prov}</div>
      <div class="lb-head-plan">${plan}</div>
    </div>

    <div class="lb-price-block">
      <div class="lb-price-label">Monthly Price</div>
      <div class="lb-price">$${escH(dollars)}${cents?'<span class="cents">'+escH(cents)+'</span>':''}<span class="mo">/mo</span></div>
    </div>

    <div class="lb-speeds">
      <div class="lb-speed-cell">
        <div class="lb-speed-lbl">Download</div>
        <div class="lb-speed-val">${dl}</div>
      </div>
      <div class="lb-speed-cell">
        <div class="lb-speed-lbl">Upload</div>
        <div class="lb-speed-val">${ul}</div>
      </div>
      <div class="lb-speed-cell">
        <div class="lb-speed-lbl">Latency</div>
        <div class="lb-speed-val">${lat}</div>
      </div>
    </div>

    ${feesHTML}
    ${notesHTML}

    <div class="lb-foot">Broadband Facts &middot; fcc.gov/broadbandlabels</div>
  `;
}

function dlPNG(transparent){
  html2canvas(document.getElementById('label'),{
    scale:4, backgroundColor:transparent?null:'#ffffff', useCORS:true
  }).then(c=>{
    const a=document.createElement('a');
    const prov=V('fProv')||'broadband';
    const pln=V('fPlan')||'label';
    const suf=transparent?'_transparent':'';
    a.download=prov.replace(/\s+/g,'_')+'_'+pln.replace(/\s+/g,'_')+'_facts'+suf+'.png';
    a.href=c.toDataURL('image/png');
    a.click();
  });
}

function resetAll(){
  document.querySelectorAll('.fp input').forEach(el=>el.value='');
  document.getElementById('fNotes').value='';
  fees=[{n:'Installation',v:'$0'},{n:'Equipment Fee',v:'$0'},{n:'Hidden Monthly Fees',v:'$0'}];
  renderF(); render();
}

renderF(); render();
</script>
</body>
</html>
